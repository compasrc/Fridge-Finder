<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🍳 Recipe Finder</h1>
    
    <div class="section allergy-section">
      <h2>Dietary Restrictions</h2>
      <div class="allergy-filters">
        <label>
          <input type="checkbox" class="allergy-filter" value="gluten">
          Gluten-Free
        </label>
        <label>
          <input type="checkbox" class="allergy-filter" value="nuts">
          Nut-Free
        </label>
        <label>
          <input type="checkbox" class="allergy-filter" value="dairy">
          Dairy-Free
        </label>
      </div>
    </div>

    <div class="section">
      <h2>Select Your Ingredients</h2>

      <label class="remote-toggle">
        <input type="checkbox" id="use-remote">
        Use TheMealDB (online)
      </label>
      <button id="refresh-remote" style="display:inline-block; margin-left:8px;">Refresh remote data</button>
      <span id="remote-status" class="remote-status" style="margin-left:12px; color:#666;"></span>

      <div class="ingredient-search">
        <input type="text" id="ingredient-search" placeholder="Filter ingredients..." />
        <button id="select-all-ingredients" class="small-btn" style="margin-left:8px;">Select all</button>
      </div>
      <div id="ingredients-container"></div>
      <button id="search-btn">Find Recipes</button>
    </div>

    <div class="section">
      <h2>Search Results</h2>
      <div id="results"></div>
    </div>

    <div class="section">
      <h2>⭐ Your Favorites</h2>
      <div id="favorites"></div>
    </div>
  </div>

  <script src="ingredient-categories.js"></script>
  <script src="remote-recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
